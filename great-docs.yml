# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html
#
# Built site is mirrored into the committed repo-root docs/ folder by
# scripts/build_docs.py and served by nginx at /docs/python-switch.

display_name: switchlang

# Docstring format used in switchlang (":param x:" / ":return:" style).
# Pinned rather than relying on auto-detect.
parser: sphinx

# Runtime introspection — requires switchlang to be importable in this venv
# (it is installed editable via the [dev] extra).
dynamic: true

# Subpath hosting: drives Quarto's base path so CSS/JS/nav resolve.
# Keep the trailing slash.
site_url: "https://mkennedy.codes/docs/python-switch/"

# GOTCHA: sitemap/robots/canonical/og:url use a SEPARATE base URL that
# Great Docs auto-detects from the GitHub repo (-> mikeckennedy.github.io)
# and does NOT fall back to site_url. Set it explicitly or the sitemap
# points at the wrong domain.
seo:
  canonical:
    base_url: "https://mkennedy.codes/docs/python-switch/"

repo: https://github.com/mikeckennedy/python-switch
github_style: widget

# NOTE: this repo's default branch is "master", not "main".
source: { enabled: true, branch: master, placement: usage }

pypi: true

# GOTCHA: Great Docs defaults mcp.enabled to TRUE, rendering an empty "MCP"
# tab even when the project ships no MCP server. Disable it.
mcp:
  enabled: false

# Umami analytics — merged into Quarto's format.html.include-in-header, so it lands in
# the <head> of every generated page.
include_in_header:
  - text: |
      <script async src="https://uma.mkennedy.codes/script.js" data-website-id="fc9b6770-3b44-4073-944e-4a4f0e79f66a"></script>

# Changelog is hand-maintained in the repo-root CHANGELOG.md (Keep a Changelog
# format) — that file is the single source of truth, NOT GitHub Releases.
# Disable Great Docs' release-driven changelog and render CHANGELOG.md instead
# via the "Changelog" section below; scripts/build_docs.py stages the file into
# changelog/index.qmd before each build.
changelog:
  enabled: false

# Custom sections. The Changelog section renders the staged CHANGELOG.md as a
# first-class page with its own navbar link (placed after the API Reference).
sections:
  - title: Changelog
    dir: changelog
    navbar_after: Reference

skill:
  # Hand-written prose injected into the generated skill body — the execution
  # model (cases run on block exit), lambda argument binding, fall-through
  # mechanics, and key semantics — things the API signatures can't convey.
  # Adapted from the python-switch_reference.md agent guide.
  extra_body: skill_extra_body.md
  gotchas:
    - "Cases execute on block exit, not at registration: case()/default() only register; the matched function runs in __exit__, and s.result is only readable after the with block (reading it inside raises)."
    - "Case functions take no parameters — bind arguments with a lambda: s.case('b', lambda: process(val)). Passing process(val) calls it immediately and registers its return value."
    - "default() ordering is not enforced: a default registered before a matching case runs as well. Always register default() last."
    - "Adjacent closed_range cases overlap (closed_range(1, 5) and closed_range(5, 9) both contain 5) and raise a duplicate-case ValueError — follow closed_range(1, 5) with closed_range(6, 9)."
    - "Keys are matched with == and stored in a set: they must be hashable, and equal-comparing keys (1 and True, 1 and 1.0) are duplicates."
    - "If no case matches and no default() is registered, the block raises Exception on exit."
    - "An exception raised inside the with block aborts the switch — it is re-raised and no case actions run."
    - "fallthrough=None is reserved for internal use — pass only True or False."
  best_practices:
    - "Register default() as the last statement in every switch block."
    - "Read s.result only after the with block exits; capture per-case data via lambdas or closures."
    - "Use closed_range(start, stop) for inclusive numeric spans and plain range() for half-open ones."
    - "Import from the package — from switchlang import switch, closed_range — never from the private __switchlang_impl module."
  decision_table:
    - need: "Map several discrete values to one action"
      use: "s.case(['c', 'a'], func) — list keys expand to one case per item"
    - need: "Match an inclusive numeric span"
      use: "s.case(closed_range(1, 5), func)"
    - need: "Run the next case too (fall-through)"
      use: "s.case(key, func, fallthrough=True)"
    - need: "Get the matched case's return value"
      use: "s.result, after the with block exits"
    - need: "Handle 'nothing matched'"
      use: "s.default(func), registered last"
    - need: "Match a key but do nothing"
      use: "s.case(key, lambda: None)"

# Author metadata for display in the landing page sidebar
authors:
  - name: Michael Kennedy
    role: Author
    email: michael@talkpython.fm
    github: mikeckennedy
    homepage: https://mkennedy.codes

# API Reference Structure
# -----------------------
reference:
  - title: The switch block
    desc: >
      The context manager that gives Python an explicit switch statement.
      Use it in a `with` block, register cases, then read `result`.
    contents:
      - switch

  - title: Range helpers
    desc: >
      Helpers for mapping ranges of values to a single case.
    contents:
      - closed_range

# Jupyter kernel used by Quarto for any executable code cells.
jupyter: python3
